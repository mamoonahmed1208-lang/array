<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <script>
        let arr = [10, 50, 20, 40, 30];

let smallest = arr[0];
let largest = arr[0];

for (let i = 1; i < arr.length; i++) {
    if (arr[i] < smallest) {
        smallest = arr[i];
    }
    if (arr[i] > largest) {
        largest = arr[i];
    }
}

console.log("Smallest =", smallest);
console.log("Largest =", largest);
    </script>
</body>
</html>
